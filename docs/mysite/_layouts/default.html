<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <header class="site-top">
      <div class="site-top-inner">
        <h1 class="site-title"><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
        <nav class="top-nav">
          <ul>
            <li><a href="{{ "/" | relative_url }}">Home</a></li>
            <li><a href="{{ "/papers/" | relative_url }}">Papers</a></li>
            <li><a href="{{ "/about/" | relative_url }}">About</a></li>
            <li><a href="{{ "/misc/" | relative_url }}">Misc</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="wrapper content-wrapper">
      {{ content }}
    </main>

    <!-- <footer class="site-footer">
      <p>© {{ "now" | date: "%Y" }} {{ site.title }}</p>
    </footer> -->
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          processEscapes: true
        }
      });
    </script>
    <script type="text/javascript"
          src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.3/MathJax.js?config=TeX-AMS-MML_HTMLorMML">
    </script>
  </body>
</html>
